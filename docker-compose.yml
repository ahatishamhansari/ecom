services:
  postgres:
    image: postgres:16-alpine
    container_name: styleforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: styleforge
      POSTGRES_PASSWORD: styleforge_secret
      POSTGRES_DB: styleforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7-jammy
    container_name: styleforge_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: styleforge
      MONGO_INITDB_ROOT_PASSWORD: styleforge_secret
      MONGO_INITDB_DATABASE: styleforge_catalog
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: styleforge_redis
    restart: unless-stopped
    command: redis-server --requirepass styleforge_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: styleforge_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: styleforge_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: styleforge_meili_secret
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: styleforge_ml_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  qdrant_data:
  meili_data:
